spring:
  h2:
    console:
      enabled: true
  jpa:
    defer-datasource-initialization: true 
    generate-ddl: true
    hibernate:
      ddl-auto: update 
  
server:
  error:
    include-message: always

allowed-origins: http://localhost:3000
default-password: password

---

spring:
  config:
    activate:
      on-profile: prod

allowed-origins: "https://www.firstlegoleague.win,https://*.vercel.app,http://localhost:3000"

logging:
  level:
    org:
      hibernate: error
      springframework.core: error
      springframework.web: error
    root: error